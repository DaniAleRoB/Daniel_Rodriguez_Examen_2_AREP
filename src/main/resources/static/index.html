<!DOCTYPE html>
<html>
<head>
    <title>Math Services</title>
</head>
<body>

<h2>Factors</h2>
<input type="text" id="fval">
<button onclick="factors()">Calcular</button>
<div id="fresult"></div>

<h2>Primes</h2>
<input type="text" id="pval">
<button onclick="primes()">Calcular</button>
<div id="presult"></div>

<script>
function factors() {
    let val = document.getElementById("fval").value;

    fetch("/math/factors?value=" + val)
    .then(res => res.json())
    .then(data => {
        document.getElementById("fresult").innerHTML = data.output;
    });
}

function primes() {
    let val = document.getElementById("pval").value;

    fetch("/math/primes?value=" + val)
    .then(res => res.json())
    .then(data => {
        document.getElementById("presult").innerHTML = data.output;
    });
}
</script>

</body>
</html>
